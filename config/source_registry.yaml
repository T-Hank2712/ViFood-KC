sources:
  - id: SOURCE:VIFOOD_TRANSLATION_SEED
    name: ViFood-KG Vietnamese translation seed
    url: internal://vi-food-translation-seed
    roles: [reviewed_translation]
    ingestion: deterministic_mapping
  - id: SOURCE:FOODON
    name: FoodOn
    url: https://github.com/FoodOntology/foodon
    license: CC-BY-4.0
    formats: [owl, tsv]
    roles: [ingredient_taxonomy, food_category_taxonomy, synonyms]
    ingestion: selective
  - id: SOURCE:CHEBI
    name: ChEBI
    url: https://www.ebi.ac.uk/chebi/downloads/
    license: CC-BY-4.0
    formats: [tsv, json, obo, owl]
    roles: [chemical_identifier, synonym, chemical_hierarchy]
    ingestion: selective_future
  - id: SOURCE:FAO_INFOODS_TAGNAMES
    name: FAO/INFOODS Tagnames
    url: https://www.fao.org/infoods/infoods/standards-guidelines/food-component-identifiers-tagnames/en/
    roles: [nutrient_identifier]
    ingestion: curated_master
  - id: SOURCE:VN_FCT_2007
    name: Bảng thành phần thực phẩm Việt Nam 2007
    url: https://www.fao.org/fileadmin/templates/food_composition/documents/pdf/VTN_FCT_2007.pdf
    formats: [pdf]
    roles: [vietnam_nutrient_reference]
    ingestion: reference_only
  - id: SOURCE:VN_SMILING_FCT_2013
    name: Bảng thành phần thực phẩm Việt Nam SMILING 2013
    url: https://www.fao.org/fileadmin/templates/food_composition/documents/FCT_SMILING_PROJECT_ASIA/D3_5a_SMILING_FCT_Vietnam_180713_protected.xlsx
    formats: [xlsx]
    roles: [vietnam_nutrient_presence, vietnam_nutrient_tagname]
    ingestion: automatic_exact_tagname_intersection
  - id: SOURCE:VN_TT29_2023
    name: Thông tư 29/2023/TT-BYT về ghi thành phần, giá trị dinh dưỡng trên nhãn thực phẩm
    url: https://vfa.gov.vn/van-ban/tai-tep-158f3069a435b314a80bdcb024f8e422.html
    formats: [pdf]
    roles: [vietnam_nutrition_labelling_requirement]
    ingestion: verified_legal_extraction
  - id: SOURCE:USDA_FDC
    name: USDA FoodData Central
    url: https://fdc.nal.usda.gov/download-datasets/
    license: CC0-1.0
    formats: [csv, json, api]
    roles: [ingredient_nutrient]
    ingestion: selective_future
  - id: SOURCE:VN_VBHN_09_2024
    name: Văn bản hợp nhất 09/VBHN-BYT (2024)
    url: https://datafiles.chinhphu.vn/cpp/files/vbpq/2024/9/09-vbhn-byt.pdf
    formats: [pdf]
    roles: [vietnam_additive_regulation]
    ingestion: automatic_appendix_1_extraction
  - id: SOURCE:CODEX_GSFA
    name: Codex General Standard for Food Additives
    url: https://www.fao.org/gsfaonline/
    roles: [additive_identifier, additive_functional_class]
    ingestion: selective_future
  - id: SOURCE:WHO_HEALTHY_DIET
    name: WHO Healthy Diet
    url: https://www.who.int/news-room/fact-sheets/detail/healthy-diet
    roles: [health_claim_evidence]
    ingestion: curated_claims_future
