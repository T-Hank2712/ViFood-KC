  - id: SOURCE:VN_TT24_2019
    name: Thông tư 24/2019/TT-BYT
    url: https://vfa.gov.vn/chi-dao-dieu-hanh/ban-hanh-thong-tu-so-242019tt-byt-quy-dinh-ve-quan-ly-va-su-dung-phu-gia-thuc-pham.html
