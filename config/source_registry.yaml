sources:
  - id: SOURCE:VIFOOD_TRANSLATION_SEED
    name: ViFood-KG Vietnamese translation seed
    url: internal://vi-food-translation-seed
    roles: [reviewed_translation]
    ingestion: deterministic_mapping
  - id: SOURCE:FOODON
    name: FoodOn
    url: https://github.com/FoodOntology/foodon
    license: CC-BY-4.0
    formats: [owl, tsv]
    roles: [ingredient_taxonomy, food_category_taxonomy, synonyms]
    ingestion: selective
  - id: SOURCE:CHEBI
    name: ChEBI
    url: https://www.ebi.ac.uk/chebi/downloads/
    license: CC-BY-4.0
    formats: [tsv, json, obo, owl]
    roles: [chemical_identifier, synonym, chemical_hierarchy]
    ingestion: selective
  - id: SOURCE:FAO_INFOODS_TAGNAMES
    name: FAO/INFOODS Tagnames
    url: https://www.fao.org/infoods/infoods/standards-guidelines/food-component-identifiers-tagnames/en/
    roles: [nutrient_identifier]
